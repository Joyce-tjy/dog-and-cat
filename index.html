<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙人對戰：貓咪與狗狗大戰爭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #1a202c;
            color: white;
            overflow: hidden; /* 防止滾動 */
            touch-action: none; /* 防止手機瀏覽器滑動手勢干擾 */
        }
        canvas {
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 60%, #8B4513 60%, #654321 100%);
        }
        .key-btn {
            display: inline-block;
            background-color: #4a5568;
            border-radius: 4px;
            padding: 2px 8px;
            font-weight: bold;
            border-bottom: 2px solid #2d3748;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center">

    <!-- 遊戲標題與狀態列 -->
    <div class="w-full max-w-5xl flex justify-between items-end mb-2 px-4">
        <!-- 1P 狀態 -->
        <div class="flex flex-col items-start bg-blue-900/50 p-3 rounded-lg border-2 border-blue-500 w-1/3">
            <h2 class="text-xl font-bold text-blue-300">1P 貓咪軍團 (左)</h2>
            <div class="text-yellow-400 font-bold text-2xl tracking-wider">💰 <span id="p1-money">0</span> / 2000</div>
            <div class="text-sm mt-2 flex gap-3">
                <span class="opacity-80">召喚:</span>
                <span><span class="key-btn">A</span> 😺(100)</span>
                <span><span class="key-btn">S</span> 😼(300)</span>
                <span><span class="key-btn">D</span> 🐯(1000)</span>
            </div>
        </div>

        <!-- 中間資訊 -->
        <div class="text-center pb-4">
            <h1 class="text-3xl font-black text-white drop-shadow-md tracking-widest mb-2">喵狗大戰爭</h1>
            <button id="start-btn" class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-2 px-6 rounded-full shadow-lg transition transform hover:scale-105 active:scale-95">
                開始遊戲 / 重置
            </button>
        </div>

        <!-- 2P 狀態 -->
        <div class="flex flex-col items-end bg-red-900/50 p-3 rounded-lg border-2 border-red-500 w-1/3">
            <h2 class="text-xl font-bold text-red-300">2P 狗狗軍團 (右)</h2>
            <div class="text-yellow-400 font-bold text-2xl tracking-wider">💰 <span id="p2-money">0</span> / 2000</div>
            <div class="text-sm mt-2 flex gap-3">
                <span>🐶(100) <span class="key-btn">J</span></span>
                <span>🐺(300) <span class="key-btn">K</span></span>
                <span>🐻(1000) <span class="key-btn">L</span></span>
                <span class="opacity-80">:召喚</span>
            </div>
        </div>
    </div>

    <!-- 遊戲畫布 -->
    <div class="relative w-full max-w-5xl">
        <canvas id="gameCanvas" width="1000" height="400" class="w-full h-auto rounded-xl border-4 border-gray-700"></canvas>
        
        <!-- 遊戲結束遮罩 -->
        <div id="game-over-screen" class="absolute inset-0 bg-black/80 hidden flex-col items-center justify-center rounded-xl z-10">
            <h2 id="winner-text" class="text-6xl font-black mb-6 text-yellow-400 drop-shadow-[0_0_10px_rgba(255,255,0,0.8)]">1P 獲勝！</h2>
            <p class="text-xl text-gray-300 mb-8">按「開始遊戲 / 重置」重新來過</p>
        </div>
    </div>

    <script>
        // 取得 Canvas 元素與 Context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI 元素
        const p1MoneyEl = document.getElementById('p1-money');
        const p2MoneyEl = document.getElementById('p2-money');
        const startBtn = document.getElementById('start-btn');
        const gameOverScreen = document.getElementById('game-over-screen');
        const winnerText = document.getElementById('winner-text');

        // 遊戲設定常數
        const FPS = 60;
        const GROUND_Y = 240; // 地面高度
        const MAX_MONEY = 2000;
        const MONEY_GEN_RATE = 2.5; // 每幀增加的金錢

        // 兵種設定資料庫
        const UNIT_DATA = {
            // 1P 貓咪軍團 (向右移動)
            p1_basic:  { emoji: '😺', cost: 100, hp: 150, maxHp: 150, atk: 25, range: 40, speed: 1.8, cooldown: 60, size: 30, color: '#3b82f6' },
            p1_medium: { emoji: '😼', cost: 300, hp: 450, maxHp: 450, atk: 80, range: 45, speed: 1.2, cooldown: 90, size: 45, color: '#2563eb' },
            p1_tank:   { emoji: '🐯', cost: 1000, hp: 2500, maxHp: 2500, atk: 250, range: 60, speed: 0.6, cooldown: 150, size: 70, color: '#1d4ed8' },
            // 2P 狗狗軍團 (向左移動)
            p2_basic:  { emoji: '🐶', cost: 100, hp: 150, maxHp: 150, atk: 25, range: 40, speed: 1.8, cooldown: 60, size: 30, color: '#ef4444' },
            p2_medium: { emoji: '🐺', cost: 300, hp: 450, maxHp: 450, atk: 80, range: 45, speed: 1.2, cooldown: 90, size: 45, color: '#dc2626' },
            p2_tank:   { emoji: '🐻', cost: 1000, hp: 2500, maxHp: 2500, atk: 250, range: 60, speed: 0.6, cooldown: 150, size: 70, color: '#b91c1c' },
        };

        // 遊戲狀態物件
        let game = {
            isRunning: false,
            p1: { money: 0, baseHp: 5000, maxBaseHp: 5000 },
            p2: { money: 0, baseHp: 5000, maxBaseHp: 5000 },
            units: [], // 存放場上所有單位
            particles: [], // 特效粒子
            lastTime: 0
        };

        // 實體類別 (包含單位與基地)
        class Entity {
            constructor(x, owner, data) {
                this.x = x;
                this.y = GROUND_Y;
                this.owner = owner; // 1 = 1P, 2 = 2P
                
                this.emoji = data.emoji;
                this.hp = data.hp;
                this.maxHp = data.maxHp;
                this.atk = data.atk;
                this.range = data.range;
                this.speed = data.speed;
                this.cooldown = data.cooldown;
                this.size = data.size;
                this.color = data.color;

                this.currentCooldown = 0;
                this.isDead = false;
                this.animOffset = 0; // 走路動畫位移
                this.animDir = 1;
            }

            // 取得單位的碰撞前緣 (X座標)
            getFrontX() {
                // 1P 往前是向右 (+)，2P 往前是向左 (-)
                return this.owner === 1 ? this.x + (this.size / 2) : this.x - (this.size / 2);
            }

            // 取得單位後方邊緣 (X座標)
            getBackX() {
                return this.owner === 1 ? this.x - (this.size / 2) : this.x + (this.size / 2);
            }

            update() {
                if (this.isDead) return;

                // 處理冷卻時間
                if (this.currentCooldown > 0) {
                    this.currentCooldown--;
                }

                // 尋找目標
                let target = this.findTarget();

                if (target) {
                    // 有目標且在射程內 -> 攻擊
                    this.animOffset = 0; // 停止走路動畫
                    if (this.currentCooldown <= 0) {
                        this.attack(target);
                    }
                } else {
                    // 沒目標或不在射程內 -> 移動
                    let moveDir = this.owner === 1 ? 1 : -1;
                    this.x += this.speed * moveDir;

                    // 簡單的走路彈跳動畫
                    this.animOffset += 1.5 * this.animDir;
                    if (this.animOffset > 5 || this.animOffset < -5) this.animDir *= -1;
                }
            }

            findTarget() {
                let closestEnemy = null;
                let minDistance = Infinity;

                // 檢查所有敵方單位
                for (let unit of game.units) {
                    if (unit.owner !== this.owner && !unit.isDead) {
                        // 計算前緣到敵人前緣的距離 (互相面對)
                        let dist = this.owner === 1 ? 
                            (unit.getBackX() - this.getFrontX()) : // 1P 看右邊的敵人
                            (this.getFrontX() - unit.getBackX());  // 2P 看左邊的敵人
                        
                        // 稍微允許重疊，避免卡住
                        if (dist <= this.range && dist > -this.size) {
                            if (dist < minDistance) {
                                minDistance = dist;
                                closestEnemy = unit;
                            }
                        }
                    }
                }

                // 如果有找到敵方單位，優先攻擊單位
                if (closestEnemy) return { type: 'unit', target: closestEnemy };

                // 如果沒敵方單位，檢查是否摸到敵方基地
                let baseFrontX = this.owner === 1 ? 850 : 150; // 基地前緣 (1P打右邊，2P打左邊)
                let distToBase = this.owner === 1 ? 
                    (baseFrontX - this.getFrontX()) : 
                    (this.getFrontX() - baseFrontX);

                if (distToBase <= this.range) {
                    return { type: 'base' };
                }

                return null;
            }

            attack(targetObj) {
                this.currentCooldown = this.cooldown;
                
                // 產生攻擊特效 (簡單的後座力表現)
                this.x += this.owner === 1 ? -10 : 10;
                setTimeout(() => { if(!this.isDead) this.x += this.owner === 1 ? 10 : -10; }, 100);

                // 扣血邏輯
                if (targetObj.type === 'unit') {
                    targetObj.target.hp -= this.atk;
                    createParticles(targetObj.target.x, targetObj.target.y - targetObj.target.size/2, this.owner === 1 ? '#ff0000' : '#00aaff');
                    if (targetObj.target.hp <= 0) {
                        targetObj.target.isDead = true;
                    }
                } else if (targetObj.type === 'base') {
                    if (this.owner === 1) {
                        game.p2.baseHp = Math.max(0, game.p2.baseHp - this.atk);
                        createParticles(900, 150, '#ff0000');
                    } else {
                        game.p1.baseHp = Math.max(0, game.p1.baseHp - this.atk);
                        createParticles(100, 150, '#00aaff');
                    }
                    checkWinCondition();
                }
            }

            draw() {
                // 繪製陰影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size/1.5, this.size/4, 0, 0, Math.PI * 2);
                ctx.fill();

                // 繪製單位 Emoji
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                // 加入走路位移
                ctx.fillText(this.emoji, this.x, this.y - Math.abs(this.animOffset));

                // 繪製血條
                let barWidth = this.size;
                let barHeight = 6;
                let hpPercent = Math.max(0, this.hp / this.maxHp);
                let barY = this.y - this.size - 10;

                ctx.fillStyle = 'black';
                ctx.fillRect(this.x - barWidth/2 - 1, barY - 1, barWidth + 2, barHeight + 2);
                ctx.fillStyle = 'red';
                ctx.fillRect(this.x - barWidth/2, barY, barWidth, barHeight);
                ctx.fillStyle = '#22c55e'; // 綠色
                ctx.fillRect(this.x - barWidth/2, barY, barWidth * hpPercent, barHeight);
            }
        }

        // 簡單特效粒子系統
        function createParticles(x, y, color) {
            for(let i=0; i<5; i++) {
                game.particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 1) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function updateAndDrawParticles() {
            for (let i = game.particles.length - 1; i >= 0; i--) {
                let p = game.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5; // 重力
                p.life -= 0.05;

                if (p.life <= 0) {
                    game.particles.splice(i, 1);
                } else {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }
        }

        // 產生單位的函式
        function spawnUnit(owner, typeKey) {
            if (!game.isRunning) return;
            
            let data = UNIT_DATA[typeKey];
            let playerState = owner === 1 ? game.p1 : game.p2;

            if (playerState.money >= data.cost) {
                playerState.money -= data.cost;
                // 1P 從左邊出發(x=100)，2P 從右邊出發(x=900)
                let spawnX = owner === 1 ? 120 + Math.random()*20 : 880 - Math.random()*20;
                game.units.push(new Entity(spawnX, owner, data));
            }
        }

        // 鍵盤監聽
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            // 1P 召喚 (A, S, D)
            if (key === 'a') spawnUnit(1, 'p1_basic');
            if (key === 's') spawnUnit(1, 'p1_medium');
            if (key === 'd') spawnUnit(1, 'p1_tank');

            // 2P 召喚 (J, K, L)
            if (key === 'j') spawnUnit(2, 'p2_basic');
            if (key === 'k') spawnUnit(2, 'p2_medium');
            if (key === 'l') spawnUnit(2, 'p2_tank');
        });

        // 繪製基地
        function drawBases() {
            // 繪製城堡形狀 (簡化版)
            const drawTower = (x, color, isP1) => {
                ctx.fillStyle = color;
                ctx.fillRect(x - 40, GROUND_Y - 120, 80, 120);
                // 城堡頂部城垛
                ctx.fillRect(x - 45, GROUND_Y - 140, 20, 20);
                ctx.fillRect(x - 10, GROUND_Y - 140, 20, 20);
                ctx.fillRect(x + 25, GROUND_Y - 140, 20, 20);
                
                // 畫大門
                ctx.fillStyle = '#4a3f35';
                ctx.beginPath();
                ctx.arc(x, GROUND_Y, 25, Math.PI, 0);
                ctx.fill();

                // 畫旗幟
                ctx.fillStyle = '#888';
                ctx.fillRect(x, GROUND_Y - 200, 4, 60);
                ctx.fillStyle = isP1 ? 'blue' : 'red';
                if(isP1) {
                    ctx.beginPath(); ctx.moveTo(x+4, GROUND_Y-200); ctx.lineTo(x+30, GROUND_Y-185); ctx.lineTo(x+4, GROUND_Y-170); ctx.fill();
                } else {
                    ctx.beginPath(); ctx.moveTo(x-4, GROUND_Y-200); ctx.lineTo(x-30, GROUND_Y-185); ctx.lineTo(x-4, GROUND_Y-170); ctx.fill();
                }
            };

            drawTower(100, '#64748b', true); // 1P 基地
            drawTower(900, '#64748b', false); // 2P 基地

            // 繪製基地血條
            const drawBaseHp = (x, hp, maxHp, title) => {
                let barWidth = 120;
                let barHeight = 15;
                let hpPercent = Math.max(0, hp / maxHp);
                
                ctx.fillStyle = 'black';
                ctx.fillRect(x - barWidth/2 - 2, 48, barWidth + 4, barHeight + 4);
                ctx.fillStyle = 'red';
                ctx.fillRect(x - barWidth/2, 50, barWidth, barHeight);
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(x - barWidth/2, 50, barWidth * hpPercent, barHeight);

                ctx.font = '16px "Noto Sans TC", sans-serif';
                ctx.fillStyle = 'white';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${hp} / ${maxHp}`, x, 50 + barHeight/2);
            };

            drawBaseHp(100, Math.floor(game.p1.baseHp), game.p1.maxBaseHp, "1P");
            drawBaseHp(900, Math.floor(game.p2.baseHp), game.p2.maxBaseHp, "2P");
        }

        // 檢查勝利條件
        function checkWinCondition() {
            if (!game.isRunning) return;

            if (game.p2.baseHp <= 0) {
                game.isRunning = false;
                winnerText.innerText = "🎉 1P 貓咪軍團 獲勝！ 🎉";
                winnerText.className = "text-6xl font-black mb-6 text-blue-400 drop-shadow-[0_0_15px_rgba(59,130,246,0.8)]";
                gameOverScreen.classList.remove('hidden');
                gameOverScreen.classList.add('flex');
            } else if (game.p1.baseHp <= 0) {
                game.isRunning = false;
                winnerText.innerText = "🎉 2P 狗狗軍團 獲勝！ 🎉";
                winnerText.className = "text-6xl font-black mb-6 text-red-400 drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]";
                gameOverScreen.classList.remove('hidden');
                gameOverScreen.classList.add('flex');
            }
        }

        // 初始化/重置遊戲
        function initGame() {
            game.isRunning = true;
            game.p1 = { money: 500, baseHp: 5000, maxBaseHp: 5000 }; // 初始給點錢
            game.p2 = { money: 500, baseHp: 5000, maxBaseHp: 5000 };
            game.units = [];
            game.particles = [];
            gameOverScreen.classList.add('hidden');
            gameOverScreen.classList.remove('flex');
            requestAnimationFrame(gameLoop);
        }

        // 主遊戲迴圈
        function gameLoop(timestamp) {
            if (!game.isRunning) return; // 停止更新

            // 清除畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 增加金錢
            if (game.p1.money < MAX_MONEY) game.p1.money += MONEY_GEN_RATE;
            if (game.p2.money < MAX_MONEY) game.p2.money += MONEY_GEN_RATE;

            // 更新 UI 顯示
            p1MoneyEl.innerText = Math.floor(game.p1.money);
            p2MoneyEl.innerText = Math.floor(game.p2.money);

            // 繪製背景裝飾 (簡單的雲朵和山丘)
            ctx.fillStyle = '#ffffff44';
            ctx.beginPath(); ctx.arc(200, 80, 30, 0, Math.PI*2); ctx.arc(240, 80, 40, 0, Math.PI*2); ctx.arc(280, 80, 30, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(700, 100, 25, 0, Math.PI*2); ctx.arc(730, 100, 35, 0, Math.PI*2); ctx.arc(760, 100, 25, 0, Math.PI*2); ctx.fill();

            // 繪製地面線
            ctx.fillStyle = '#4d2c10'; // 深咖啡色地面
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
            // 草地表層
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(0, GROUND_Y - 5, canvas.width, 10);

            // 繪製基地
            drawBases();

            // 更新並繪製單位
            for (let i = game.units.length - 1; i >= 0; i--) {
                let unit = game.units[i];
                unit.update();
                
                if (unit.isDead) {
                    game.units.splice(i, 1); // 移除死亡單位
                } else {
                    unit.draw();
                }
            }

            // 更新並繪製特效
            updateAndDrawParticles();

            // 繼續迴圈
            requestAnimationFrame(gameLoop);
        }

        // 綁定按鈕
        startBtn.addEventListener('click', initGame);

        // 初始繪製一次畫面 (但不開始動態迴圈)
        ctx.fillStyle = '#4d2c10'; ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
        ctx.fillStyle = '#4ade80'; ctx.fillRect(0, GROUND_Y - 5, canvas.width, 10);
        drawBases();
        ctx.font = '30px "Noto Sans TC"';
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.textAlign = 'center';
        ctx.fillText("點擊上方「開始遊戲」以啟動", canvas.width/2, canvas.height/2);

    </script>
</body>
</html>
